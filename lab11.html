<!DOCTYPE html>
<html>
<head>
<title>Form Example</title>
<meta charset="UTF-8">
<style>
body {
  background-color: #ffb6c1;
  font-family: Arial, sans-serif;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.form-box {
  background-color: white;
  padding: 35px;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  width: 400px;
}
p {
  margin: 12px 0;
  font-size: 16px;
}
input[type="text"], input[type="password"], input[type="file"] {
  font-weight: bold;
  padding: 6px 8px;
  border: 2px solid #ffb6c1;
  border-radius: 5px;
  width: 100%;
  box-sizing: border-box;
}
input[type="submit"], button {
  font-weight: bold;
  font-size: 15px;
  padding: 10px 18px;
  background-color: #ff69b4;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
}
input[type="submit"]:hover, button:hover {
  background-color: #ff1493;
}
h2 {
  color: #c71585;
  margin-top: 20px;
  text-align: center;
}
hr {
  border: none;
  border-top: 2px solid #ffb6c1;
  margin: 18px 0;
}
button img {
  vertical-align: middle;
  margin-right: 5px;
}
</style>
</head>
<body>

<div class="form-box">
<form>
<p>Username: <input type="text" name="username" size="15" maxlength="20"/> </p>
<p>Password: <input type="password" name="password" size="15" maxlength="20"/> </p>
<input type="submit" name="log" value="Login"/>

<hr>

<h2>Radiobutton</h2>
<p>Please select your favorite music genre:
<br>
<input type="radio" name="genre" value="pop"/> Pop
<input type="radio" name="genre" value="rock"/> Rock
<input type="radio" name="genre" value="jazz"/> Jazz
</p>

<hr>

<h2>Checkbox</h2>
<p>Please select your talent/s:
<br>
<input type="checkbox" name="talent" value="Singing"/> Singing
<input type="checkbox" name="talent" value="Dancing"/> Dancing
<input type="checkbox" name="talent" value="Drawing"/> Drawing
</p>

<hr>

<p>Upload your picture:</p>
<input type="file" id="pic" name="pic" />
<hr>

<button type="button" onclick="deleteFile()"><img src="cat.jpg" width="10"/> DELETE</button>
</form>
</div>

<script>
function deleteFile() {
  document.getElementById("pic").value = "";
  alert("File cleared!");
}
</script>

</body>
</html>
